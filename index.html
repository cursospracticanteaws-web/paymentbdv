<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Pago Móvil - Ciclo 3</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #d32f2f; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s; }
        input:focus { border-color: #d32f2f; outline: none; }
        button { width: 100%; padding: 14px; background-color: #d32f2f; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 1rem; }
        button:disabled { background-color: #e0e0e0; cursor: not-allowed; color: #999; }
        
        /* Consola de Estado */
        #status-container { margin-top: 1.5rem; padding: 15px; border-radius: 8px; background-color: #2c3e50; color: #ecf0f1; font-family: 'Consolas', monospace; font-size: 0.9rem; min-height: 60px; display: none; border-left: 5px solid #bdc3c7; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; animation: rotation 1s linear infinite; margin-right: 10px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2> Ejecución Remota BDV (banco por default BDV)</h2>
    <form id="pagoForm">
        <div class="form-group">
            <label>Cédula</label>
            <input type="text" id="cedula" placeholder="Ej: 33612754" required>
        </div>
        <div class="form-group">
            <label>Teléfono Destino</label>
            <input type="text" id="telefono" placeholder="Ej: 04242370576" required>
        </div>
        <div class="form-group">
            <label>Monto (Bs.) - Límite 1.00</label>
            <input type="number" id="monto" placeholder="0.50" step="0.01" max="1.00" required>
        </div>
        <button type="submit" id="btnPagar">Iniciar Proceso en PC</button>
    </form>

    <div id="status-container">
        <div id="status-text">Esperando inicio...</div>
    </div>
</div>

<script>
    const form = document.getElementById('pagoForm');
    const statusContainer = document.getElementById('status-container');
    const statusText = document.getElementById('status-text');
    const btn = document.getElementById('btnPagar');

    // IMPORTANTE: Cambia esta URL por la de tu LocalTunnel actual
    const API_LOCAL_URL = "https://plenty-cows-spend.loca.lt/ejecutar-pago";

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset de interfaz
        btn.disabled = true;
        statusContainer.style.display = "block";
        statusContainer.style.borderLeftColor = "#bdc3c7";
        statusText.innerHTML = '<span class="spinner"></span>Conectando con PC local...';

        const payload = {
            cedula: document.getElementById('cedula').value,
            telefono: document.getElementById('telefono').value,
            monto: document.getElementById('monto').value
        };

        try {
            const response = await fetch(API_LOCAL_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error("Error en el servidor local");

            // LÓGICA DE STREAMING (Lectura en tiempo real)
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                lines.forEach(line => {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.replace('data: ', ''));
                            
                            // Actualizar el texto según el mensaje recibido del 9096
                            statusText.innerHTML = `<span class="spinner"></span> ${data.message}`;

                            // Cambiar colores según el tipo de mensaje
                            if (data.type === 'success') {
                                statusText.innerHTML = `✅ ${data.message}`;
                                statusContainer.style.borderLeftColor = "#2ecc71";
                            } else if (data.type === 'error') {
                                statusText.innerHTML = `❌ ${data.message}`;
                                statusContainer.style.borderLeftColor = "#e74c3c";
                            }
                        } catch (e) {
                            console.error("Error parseando stream:", e);
                        }
                    }
                });
            }

        } catch (error) {
            statusText.innerHTML = "🚫 Error de conexión. Revisa el túnel y la IP.";
            statusContainer.style.borderLeftColor = "#f1c40f";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
